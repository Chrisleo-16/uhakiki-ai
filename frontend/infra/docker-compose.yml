version: "3.8"

services:
  # --- 1. SOVEREIGN IDENTITY VAULT (Milvus) ---
  etcd:
    container_name: infra-etcd-1
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_RETENTION=1
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_HEARTBEAT_INTERVAL=500
      - ETCD_ELECTION_TIMEOUT=2500
    command: etcd --advertise-client-urls http://etcd:2379 --listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - ./etcd_data:/etcd
    networks:
      - sovereign_net

  minio:
    container_name: infra-minio-1
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: server /data
    volumes:
      - minio_data:/data
    networks:
      - sovereign_net

  milvus:
    container_name: infra-milvus-1
    image: milvusdb/milvus:v2.3.0
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    networks:
      - sovereign_net

  # --- 2. STATE PERSISTENCE (Redis) ---
  redis:
    container_name: infra-redis-1
    image: redis:7.0-alpine
    volumes:
      - redis_state:/data
    networks:
      - sovereign_net

  # --- 3. UHAKIKIAI NEURAL ENGINE (Backend) ---
  backend:
    container_name: app-backend-1
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MILVUS_URI=http://milvus:19530
      - REDIS_HOST=redis
      - DPA_VERSION=2019_COMPLIANT
    networks:
      - sovereign_net
    depends_on:
      - milvus
      - redis

networks:
  sovereign_net:
    driver: bridge

volumes:
  minio_data:
  milvus_data:
  redis_state:
