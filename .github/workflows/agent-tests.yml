# Automated CrewAI/LangGraph validation
name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Logic Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install everything normally. We skip 'pip install -e' to avoid the build error.
          pip install fastapi httpx pytest uvicorn torch torchvision opencv-python-headless pymilvus python-multipart langchain langchain-milvus

      - name: Run OODA Loop Tests
        run: |
          # The "Bypass": We manually point Python to the backend folder.
          # This makes 'import app' work without needing a complex build backend.
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          cd backend
          python -m pytest tests/test_main.py
