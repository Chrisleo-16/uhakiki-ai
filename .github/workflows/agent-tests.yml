name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 3.11 is the 'Goldilocks' version for AI stability

      - name: Install System Dependencies (C++ & OCR)
        run: |
          sudo apt-get update
          # We replaced libgl1-mesa-glx with libgl1 and added libglib2.0-0
          sudo apt-get install -y cmake build-essential libboost-all-dev tesseract-ocr libgl1 libglib2.0-0

      - name: Install Python Logic (Sovereign Fast Resolution)
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install uv
          # We force the CPU versions of torch and torchvision to avoid kernel conflicts
          # and ensure they come from the same PyTorch CPU index.
          uv pip install --system --no-cache \
            --index-strategy unsafe-best-match \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.4.0+cpu torchvision==0.19.0+cpu \
            # pytest pytest-mock qrcode[pil] "crewai>=0.83.0" litellm -r requirements.txt

      - name: Install Dependencies & Run OODA Loop
        working-directory: ./backend
        run: |
          # 1. Upgrade pip to ensure clean installs
          python -m pip install --upgrade pip

          # 2. CRITICAL: Install EXACT CPU Versions matching requirements.txt
          # We force Torch 2.2.1 and Vision 0.17.1 from the CPU index.
          # This prevents the "roi_align" kernel crash.
          python -m pip install torch==2.2.1+cpu torchvision==0.17.1+cpu --index-url https://download.pytorch.org/whl/cpu

          # 3. Install the rest of the stack
          # We remove 'torch' lines from requirements.txt so pip doesn't try to reinstall the GPU version
          grep -v "torch" requirements.txt > ci_requirements.txt
          python -m pip install -r ci_requirements.txt

          # 4. Install Test Tools explicitly (FastAPI & Pytest)
          python -m pip install pytest pytest-mock httpx

          # 5. Set PYTHONPATH so 'app' module is found
          export PYTHONPATH=$PYTHONPATH:$(pwd)

          # 6. Run the Test
          echo "[-] Starting Neural Integrity Check..."
          python -m pytest -v tests/test_main.py