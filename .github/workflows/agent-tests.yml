name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 3.11 is the 'Goldilocks' version for AI stability

      - name: Install System Dependencies (C++ & OCR)
        run: |
          sudo apt-get update
          # We replaced libgl1-mesa-glx with libgl1 and added libglib2.0-0
          sudo apt-get install -y cmake build-essential libboost-all-dev tesseract-ocr libgl1 libglib2.0-0

      - name: Install Python Logic (Sovereign Fast Resolution)
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install uv
          # We force the CPU versions of torch and torchvision to avoid kernel conflicts
          # and ensure they come from the same PyTorch CPU index.
          uv pip install --system --no-cache \
            --index-strategy unsafe-best-match \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.4.0+cpu torchvision==0.19.0+cpu \
            # pytest pytest-mock qrcode[pil] "crewai>=0.83.0" litellm -r requirements.txt

      - name: Sovereign Dependency Resolution & Test OODA Loop
        working-directory: ./backend
        run: |
          # 1. Install uv - the ultra-fast resolver to prevent "resolution-too-deep"
          python -m pip install --upgrade pip
          pip install uv

          # 2. Synchronize Environment
          # We use uv pip install because it has a superior resolution engine.
          # We force the CPU-only wheels for Torch/Vision as required.
          uv pip install --system \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "torch==2.2.1+cpu" \
            "torchvision==0.17.1+cpu"

          # 3. Solve the Dependency Graph
          # We filter out torch/torchvision from requirements.txt to prevent conflicts.
          # uv handles the complex Pydantic/CrewAI/LangChain relationships much better than pip.
          grep -v "torch" requirements.txt > ci_requirements.txt
          
          # We add specific pins for problematic packages to guide the resolver
          uv pip install --system -r ci_requirements.txt \
            "pydantic>=2.7.0,<3.0.0" \
            "pydantic-settings>=2.2.0" \
            "pytest>=8.0.0" \
            "pytest-mock" \
            "httpx"

          # 4. Set Environment Path
          export PYTHONPATH=$PYTHONPATH:$(pwd)

          # 5. Execute OODA Loop Tests
          echo "[*] Launching Neural Integrity Check..."
          python -m pytest -v tests/test_main.py