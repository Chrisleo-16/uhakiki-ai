# Automated CrewAI/LangGraph validation
name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Project  and Neural Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Installing in editable mode solves pathing forever
          pip install -e backend/ 
          pip install -r backend/requirements.txt

      - name: Run Tests
        run: |
          # No more 'export PYTHONPATH' needed!
          cd backend && python -m pytest
          # 3. Run pytest as a module (this is the magic fix)
          python -m pytest tests/test-main.py
