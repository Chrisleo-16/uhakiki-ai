name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 3.11 is the 'Goldilocks' version for AI stability

      - name: Install System Dependencies (C++ & OCR)
        run: |
          sudo apt-get update
          # We replaced libgl1-mesa-glx with libgl1 and added libglib2.0-0
          sudo apt-get install -y cmake build-essential libboost-all-dev tesseract-ocr libgl1 libglib2.0-0

      - name: Install Python Logic
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # We use --use-pep517 to help with the heavy C++ builds for face_recognition
          pip install --no-cache-dir --use-pep517 -r requirements.txt

      - name: Run OODA Loop Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          cd backend
          python -m pytest -v tests/test_main.py