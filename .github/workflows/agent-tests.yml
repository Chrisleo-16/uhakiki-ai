# Automated CrewAI/LangGraph validation
name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Project and Build Tools
        run: |
          # 1. Upgrade pip and install the missing build backends explicitly
          python -m pip install --upgrade pip setuptools wheel

          # 2. Install dependencies FIRST
          pip install -r backend/requirements.txt

          # 3. Install the project WITHOUT build isolation
          # This is the "Magic Key" that stops the BackendUnavailable error
          pip install -e backend/ --no-build-isolation

      - name: Run Tests
        run: |
          # No more 'export PYTHONPATH' needed!
          cd backend && python -m pytest
          # 3. Run pytest as a module (this is the magic fix)
          python -m pytest tests/test-main.py
