name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 3.11 is the 'Goldilocks' version for AI stability

      - name: Install System Dependencies (C++ & OCR)
        run: |
          sudo apt-get update
          # We replaced libgl1-mesa-glx with libgl1 and added libglib2.0-0
          sudo apt-get install -y cmake build-essential libboost-all-dev tesseract-ocr libgl1 libglib2.0-0

      - name: Install Python Logic (Sovereign Fast Resolution)
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install uv
          # We use --index-strategy to find compatible 'requests' across all indexes
          uv pip install --system --no-cache \
            --index-strategy unsafe-best-match \
            pytest pytest-mock qrcode[pil] -r requirements.txt

      - name: Run OODA Loop Tests
        run: |
          # Add the backend folder to path so the tests can find your app code
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          # Run pytest using 'python -m' to ensure it uses the correct environment
          python -m pytest -v backend/tests/test_main.py