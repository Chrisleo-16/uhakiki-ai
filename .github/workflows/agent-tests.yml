# Automated CrewAI/LangGraph validation
name: Uhakiki Agentic Audit
on: [push, pull_request]

jobs:
  neural-integrity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip" # Speeds up subsequent runs

      - name: Force Install Build Tools
        run: |
          python -m pip install --upgrade pip
          # We install these globally so the runner definitely has them
          python -m pip install setuptools>=61.0 wheel build

      - name: Install Project (No-Isolation Mode)
        run: |
          # 1. Install raw dependencies first
          pip install -r backend/requirements.txt

          # 2. Install the backend package using --no-build-isolation
          # This forces pip to use the setuptools we just installed above
          pip install --editable ./backend --no-build-isolation

      - name: Run Neural Integrity Check
        run: |
          cd backend
          # Using python -m pytest is the most stable way to run tests
          python -m pytest tests/test_main.py
